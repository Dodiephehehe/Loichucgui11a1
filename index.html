<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi 11A1 hehe</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --env-color: #f3e5ab; /* Màu kem phong bì */
            --env-dark: #e5d38f;
            --paper-color: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            transition: background 0.8s ease;
            overflow: hidden;
        }

        body { background: url('bg1.jpg') no-repeat center center/cover; }

        .container { 
            position: relative;
            width: 100%;
            height: 100vh;
        }

        .screen { 
            display: none; 
            width: 100%; 
            position: absolute;
            left: 0;
            animation: fadeIn 0.5s; 
        }

        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* MÀN 1: NHẬP TÊN - ĐẨY LÊN CAO */
        #screen1 {
            top: 40px; /* Khoảng cách sát đỉnh */
            text-align: center;
        }

        .input-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: inline-block;
        }

        input { padding: 12px; font-size: 18px; border: 2px solid #ddd; border-radius: 8px; width: 250px; display: block; margin: 20px auto; text-align: center; }
        button { padding: 12px 35px; font-size: 18px; background: #e74c3c; color: white; border: none; border-radius: 8px; cursor: pointer; }

        /* MÀN 2: PHONG BÌ - GIỮ NGUYÊN GIỮA MÀN HÌNH */
        #screen2 {
            top: 0;
            height: 100vh;
            display: none; /* Sẽ được display: flex khi .active */
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #screen2.active { display: flex; }

        .envelope-wrapper {
            position: relative;
            width: 300px; height: 200px;
            background: var(--env-dark);
            cursor: pointer;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .paper {
            position: absolute; bottom: 5px; left: 10px;
            width: 280px; height: 180px;
            background: var(--paper-color);
            z-index: 1;
            transition: transform 0.8s ease-in-out 0.5s;
        }

        .flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 150px solid transparent; border-right: 150px solid transparent;
            border-top: 100px solid var(--env-color);
            z-index: 3; transform-origin: top;
            transition: transform 0.5s ease-in-out;
        }

        .pocket {
            position: absolute; bottom: 0; left: 0; width: 0; height: 0;
            border-left: 150px solid var(--env-color); border-right: 150px solid var(--env-color);
            border-bottom: 100px solid var(--env-dark); border-top: 100px solid transparent;
            z-index: 2;
        }

        .envelope-wrapper.open .flap { transform: rotateX(180deg); z-index: 0; }
        .envelope-wrapper.open .paper { transform: translateY(-100px); }
        .instruction { color: white; margin-top: 50px; font-size: 20px; font-weight: bold; }

        /* MÀN 3: LỜI CHÚC - ĐẨY LÊN CAO */
        #screen3 {
            top: 30px; /* Khoảng cách sát đỉnh */
            text-align: center;
        }

        .letter-paper {
            background: #fff; padding: 40px; max-width: 500px; margin: 0 auto;
            border-radius: 5px; box-shadow: 0 0 25px rgba(0,0,0,0.2);
            border-top: 8px solid var(--env-dark);
        }

        .message { font-size: 20px; line-height: 1.8; color: #2c3e50; white-space: pre-line; text-align: left; }
    </style>
</head>
<body>

    <div class="container">
        <div id="screen1" class="screen active">
            <div class="input-box">
                <h2>Nhập cả họ và tên để nhận lời chúc nhe</h2>
                <input type="text" id="nameInput" placeholder="Họ và tên...">
                <button onclick="checkName()">Xác nhận</button>
            </div>
        </div>

        <div id="screen2" class="screen">
            <div class="envelope-wrapper" id="envelope" onclick="openAndShow()">
                <div class="flap"></div>
                <div class="paper"></div>
                <div class="pocket"></div>
            </div>
            <p class="instruction">Bấm vào phong bì để mở thư nhé!</p>
        </div>

        <div id="screen3" class="screen">
            <div class="letter-paper">
                <h2>Thân gửi em: <span id="nameDisplay"></span></h2>
                <p class="message" id="msgDisplay"></p>
            </div>
        </div>
    </div>

    <audio id="music" src="music.mp3" loop></audio>

    <script>
        const studentData = {
            "Nguyễn Văn An": "Chúc em luôn nỗ lực và gặt hái được nhiều thành công trong môn Tin học!",
            "Lê Thị B": "Hy vọng em sẽ có những kỷ niệm thật đẹp tại HNUE nhé.",
            "Lê Yến Nhi": "Chúc con vợ mai thi anh được 8+ và lý thì cứ gọi là ez nhé :v"
        };

        let current = { name: "", msg: "" };

        function checkName() {
            const val = document.getElementById('nameInput').value.trim();
            const found = Object.keys(studentData).find(n => n.toLowerCase() === val.toLowerCase());
            if (found) {
                current.name = found; current.msg = studentData[found];
                document.body.style.background = "#1a1a1a";
                switchScreen('screen2');
            } else { 
                alert("Viết sai tên à? Em thử gõ lại tên đi :v"); 
            }
        }

        function openAndShow() {
            const env = document.getElementById('envelope');
            env.classList.add('open');

            setTimeout(() => {
                document.body.style.background = "url('bg2.jpg') no-repeat center center/cover";
                switchScreen('screen3');
                document.getElementById('nameDisplay').innerText = current.name;
                document.getElementById('msgDisplay').innerText = current.msg;
                document.getElementById('music').play();

                const end = Date.now() + 2000;
                (function frame() {
                    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            }, 1500);
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>

</html>
